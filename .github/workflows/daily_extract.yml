name: Daily Job Extraction

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:
    inputs:
      portal:
        description: 'Which portal to search'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - foundit
          - linkedin
          - adzuna
          - iimjobs
          - naukri

jobs:
  extract:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      FOUNDIT_COOKIE: ${{ secrets.FOUNDIT_COOKIE }}
      IIMJOBS_COOKIE: ${{ secrets.IIMJOBS_COOKIE }}
      NAUKRI_COOKIE: ${{ secrets.NAUKRI_COOKIE }}
      ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
      ADZUNA_API_KEY: ${{ secrets.ADZUNA_API_KEY }}
      USER_EMAIL: ${{ secrets.USER_EMAIL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job extraction
        run: |
          PORTAL="${{ github.event.inputs.portal || 'all' }}"
          if [ "$PORTAL" = "all" ]; then
            python multi_portal_job_hunter.py --cloud
          else
            python multi_portal_job_hunter.py --cloud --portal "$PORTAL"
          fi

      - name: Upload results CSV
        uses: actions/upload-artifact@v4
        with:
          name: daily-results
          path: multi_portal_results.csv
          retention-days: 7
          if-no-files-found: ignore

      - name: Send email report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_ADDRESS }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: Job Hunter Report — ${{ github.workflow_ref }}
          to: ${{ secrets.EMAIL_ADDRESS }}
          from: Job Hunter Bot
          body: |
            Pipeline run complete.
            Results saved to Supabase.
            View: https://job-hunter-x5l1.onrender.com
