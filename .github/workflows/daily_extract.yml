name: Daily Job Extraction

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      FOUNDIT_COOKIE: ${{ secrets.FOUNDIT_COOKIE }}
      IIMJOBS_COOKIE: ${{ secrets.IIMJOBS_COOKIE }}
      NAUKRI_COOKIE: ${{ secrets.NAUKRI_COOKIE }}
      ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
      ADZUNA_API_KEY: ${{ secrets.ADZUNA_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job extraction
        run: python multi_portal_job_hunter.py --cloud

      - name: Upload results CSV
        uses: actions/upload-artifact@v4
        with:
          name: daily-results
          path: multi_portal_results.csv
          retention-days: 7
          if-no-files-found: ignore
